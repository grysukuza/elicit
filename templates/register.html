{% extends "_base.html" %}
{% block title %}Create account — Clinical Decision Support{% endblock %}

{% block content %}
<section class="card auth-card">
  <h2>Create account</h2>
  <p class="hint">The first registered user is automatically granted admin privileges.</p>
  <form method="POST" action="{{ url_for('register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <label class="auth-label" for="username">Username</label>
    <input type="text" id="username" name="username" required autofocus
           value="{{ username or '' }}" />

    <label class="auth-label" for="email">Email (optional, used for reports &amp; password reset)</label>
    <input type="email" id="email" name="email" value="{{ email or '' }}" />

    <label class="auth-label" for="password">Password (min. 8 characters)</label>
    <input type="password" id="password" name="password" required minlength="8" />

    <label class="auth-label" for="password2">Confirm password</label>
    <input type="password" id="password2" name="password2" required minlength="8" />

    <button type="submit" class="btn-primary full">Create account</button>
  </form>
  <div class="auth-links">
    <a href="{{ url_for('login') }}">Already have an account? Sign in</a>
  </div>
</section>
{% endblock %}
